# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  push:
  workflow_dispatch:

  schedule:
    - cron: '0 17 * * *'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: code-default

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
      - name: Setup
        run: sudo apt-get install build-essential
      - run: sudo wget https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
      - run: unzip ./android-ndk-r21e-linux-x86_64 -d /opt
      - run: chmod +x .android/pet_detector/build_prevent.sh

      - uses: se-static-analysis/mx-coverity-actions@v1.6
        with: # TODO set your project value
          bart_api_key: ${{ secrets.BART_API_KEY}}
          prevent_script: Prevent_Build_SI_VST_libPetDetector_v1.camera.samsung.so_2025.sh
          prevent_version: "2024.12.0"
          build_cmd: "./android/pet_detector/build_prevent.sh"
          # build_path: "$GITHUB_WORKSPACE/android/image_segmentation/src/jni/" # (Optional) Default value is current directory